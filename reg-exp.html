<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <form onsubmit="return validateUser()">
        <label for="username">Username:</label>
        <input type="text" id="username" required>
    </form>
    

 <form onsubmit="return validatefrom()">
        <label for="email">Email:</label>
        <input type="email" id="email" required>
        <input type="submit" value="Submit">
    </form>


    <script>
        function validatefrom(){
            const emailInput = document.getElementById('email');
            const email = emailInput.value;
            const emailPattern = /^[^\s@]+@gmail+\.com+$/;

            if (!emailPattern.test(email)) {
                alert('Please enter a valid email address.');
                return false; // Prevent form submission
            }
            return true; // Allow form submission
        }

        
        function validateUser(){
            const usernameInput = document.getElementById('username');
            const username = usernameInput.value;
            const usernamePattern = /^[a-z][a-zA-Z0-9_]{5,15}$/;

            if (!usernamePattern.test(username)) {
                alert('Username must be 5-15 characters long and can only contain letters, numbers, and underscores.');
                return false; // Prevent form submission
            }
            return true; // Allow form submission
        }

    </script>
</body>
</html>
